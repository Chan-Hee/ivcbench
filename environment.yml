# Single lightweight conda environment for the GPU-free benchmark core, the analysis scripts that
# compute the deposited derived tables, and ALL figure scripts (which read only deposited results/).
#
#   conda env create -f environment.yml && conda activate ivc && pip install -e .
#
# Heavy per-family baselines (scGPT, GEARS/AttentionPert, CPA/chemCPA, STATE, CellOT, scPRAM) have
# CONFLICTING torch/python pins — install each in its OWN conda env; their runners under scripts/ shell
# out and read paths from $IVCBENCH_* environment variables. They are NOT needed to rebuild the figures.
name: ivc
channels: [conda-forge, bioconda]
dependencies:
  - python=3.13
  - numpy=2.*
  - scipy=1.*
  - pandas=2.*
  - scikit-learn=1.*
  - matplotlib=3.*
  - pyyaml=6.*
  - pytest=9.*
  - h5py=3.*
  - anndata=0.12.*
  - scanpy           # real-data ingestion (loaders)
  - rdkit=2026.*     # C5 chemistry: Morgan fingerprint + Murcko scaffold + Tanimoto
  - pyarrow          # parquet result rows
  - openpyxl=3.*
  - pip
  - pip:
      - python-docx==1.*   # Word export in the paper cycle
      - decoupler          # AUCell immune-program scoring on real data
      - zarr               # anndata zarr backend
